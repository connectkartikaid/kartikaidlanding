      "inLanguage": "id-ID",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://kartika.id/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }

    <!-- === SCHEMA.ORG: FAQ Page (Home) === -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Apa itu Kartika.id?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kartika.id (Kartini Teknik Berdaya) adalah komunitas yang hadir untuk memberdayakan perempuan di bidang teknik (STEM) di Indonesia, khususnya mahasiswi dari Indonesia Timur."
          }
        },
        {
          "@type": "Question",
          "name": "Program apa saja yang ada di Kartika.id?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kartika.id memiliki tiga program utama: Kartishare (webinar & knowledge sharing), Kartiship (mentorship & career building), dan Kartinection (networking antar sesama perempuan teknik)."
          }
        },
        {
          "@type": "Question",
          "name": "Siapa yang bisa bergabung dengan Kartika.id?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Kartika.id terbuka untuk seluruh mahasiswi dan perempuan yang sedang atau sudah berkarir di bidang teknik dan STEM di Indonesia."
          }
        },
        {
          "@type": "Question",
          "name": "Bagaimana cara bergabung dengan Kartika.id?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Anda dapat bergabung dengan Kartika.id melalui tombol 'Join Now' di website kami, atau dengan mengikuti program-program yang kami selenggarakan secara rutin."
          }
        }
      ]
    }
